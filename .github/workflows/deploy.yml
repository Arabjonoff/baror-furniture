name: Deploy

# main'ga har push (CI muvaffaqiyatli tugagach) serverga avtomatik deploy qiladi.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Faqat CI muvaffaqiyatli bo'lsa (yoki qo'lda ishga tushirilsa)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Serverga SSH orqali deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: bash /home/barormebel/barormebel/deploy/deploy.sh
