# Barormebel — nginx (HTTP). `certbot --nginx` bu faylga HTTPS (443) blokini
# va HTTP -> HTTPS yo'naltirishni avtomatik qo'shadi.
server {
    listen 80;
    listen [::]:80;
    server_name barormebel.uz www.barormebel.uz;

    # Mahsulot rasmlari uchun yuklash hajmi
    client_max_body_size 20M;

    # Statik fayllar (collectstatic -> staticfiles/)
    location /static/ {
        alias /home/barormebel/barormebel/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Yuklangan media (rasmlar)
    location /media/ {
        alias /home/barormebel/barormebel/media/;
        access_log off;
        expires 30d;
    }

    # Django (gunicorn)
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
